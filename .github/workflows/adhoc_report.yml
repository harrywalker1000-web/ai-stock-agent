name: Ad-Hoc Research Report

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Stock ticker (e.g. AAPL)'
        required: true
        type: string
      force_refresh:
        description: 'Force refresh (ignore 7-day cache)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  run-adhoc:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ad-hoc report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python scripts/run_adhoc_research.py ${{ github.event.inputs.ticker }}

      - name: Verify report was generated
        run: |
          TICKER="${{ github.event.inputs.ticker }}"
          NEW_FILE=$(ls -t dashboard/data/adhoc_reports/${TICKER}_*.json 2>/dev/null | head -1)
          if [ -z "$NEW_FILE" ]; then
            echo "ERROR: No report file found for $TICKER in dashboard/data/adhoc_reports/"
            echo "Contents of dashboard/data/adhoc_reports/:"
            ls -la dashboard/data/adhoc_reports/ 2>/dev/null || echo "(directory missing)"
            exit 1
          fi
          echo "Report generated: $NEW_FILE"

      - name: Commit data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase --autostash origin/main
          git add dashboard/data/adhoc_reports/
          git add data/adhoc_reports/
          git status --short
          if git diff --cached --quiet; then
            echo "ERROR: Pipeline wrote no new files — nothing staged for commit."
            echo "This should not happen after a successful pipeline run."
            exit 1
          fi
          git commit -m "chore: adhoc report ${{ github.event.inputs.ticker }} $(date -u '+%Y-%m-%d')"
          git push origin HEAD:main

      # deploy.yml triggers automatically on push to dashboard/** — no manual deploy needed here
