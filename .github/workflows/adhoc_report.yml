name: Ad-Hoc Research Report

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Stock ticker (e.g. AAPL)'
        required: true
        type: string
      force_refresh:
        description: 'Force refresh (ignore 7-day cache)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  run-adhoc:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ad-hoc report
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ARGS="--ticker ${{ github.event.inputs.ticker }}"
          if [ "${{ github.event.inputs.force_refresh }}" = "true" ]; then
            ARGS="$ARGS --force-refresh"
          fi
          python scripts/adhoc_report.py $ARGS

      - name: Sync reports to dashboard
        run: python scripts/sync_reports.py

      - name: Commit data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase --autostash origin/main
          echo "--- Files to commit ---"
          ls -la data/adhoc_reports/ 2>/dev/null || echo "data/adhoc_reports/ is empty or missing"
          ls -la dashboard/data/adhoc_reports/ 2>/dev/null || echo "dashboard/data/adhoc_reports/ is empty or missing"
          git add dashboard/data/adhoc_reports/
          git add data/adhoc_reports/
          git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: adhoc report ${{ github.event.inputs.ticker }} $(date -u '+%Y-%m-%d')"
            git push origin HEAD:main
          fi

      - name: Deploy dashboard to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_pFA012DC3TZYp9nFJKnicS6N
          VERCEL_PROJECT_ID: prj_h6mJ85DvIDbXH0vVkTMBVicjGSDp
        run: |
          npm install -g vercel --silent
          vercel deploy --prod --token=$VERCEL_TOKEN --yes --cwd dashboard
