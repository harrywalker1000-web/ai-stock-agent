name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  # GITHUB_TOKEN pushes from Actions runners don't trigger push events in other
  # workflows — GitHub blocks this to prevent infinite loops. Add workflow_run so
  # deploy fires after daily pipeline and adhoc report complete (which push data
  # files to dashboard/**) even though those pushes use GITHUB_TOKEN.
  workflow_run:
    workflows: ["Daily Pipeline Run", "Ad-Hoc Research Report"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # For workflow_run events: only deploy when the triggering workflow succeeded.
    # For push/workflow_dispatch events: always deploy.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_pFA012DC3TZYp9nFJKnicS6N
          VERCEL_PROJECT_ID: prj_h6mJ85DvIDbXH0vVkTMBVicjGSDp
        run: |
          npm install -g vercel --silent
          vercel deploy --prod --token=$VERCEL_TOKEN --yes --cwd dashboard
