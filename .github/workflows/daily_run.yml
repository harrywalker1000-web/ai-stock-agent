name: Daily Pipeline Run

on:
  schedule:
    # 9:45am ET (13:45 UTC during EDT / BST 2:45pm) on weekdays
    # 15 min after market open — lets opening volatility settle before executing trades
    - cron: '45 13 * * 1-5'
  workflow_dispatch:
    # Manual trigger for testing
    inputs:
      skip_phase_a:
        description: 'Skip Phase A (portfolio review)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      phase_a_mode:
        description: 'Phase A mode (Standard=daily sentiment refresh; Full=full re-analysis every day; Auto=Standard + Fundamental near earnings)'
        required: false
        default: 'Standard'
        type: choice
        options: ['Auto', 'Lite', 'Standard', 'Full']

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Need write access to commit results back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          # Alpaca (paper trading)
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          # Market data
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          # LLM — Anthropic is primary (pipeline uses Anthropic-first wrapper);
          # OPENAI_API_KEY kept as fallback but no longer required.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Pipeline config
          PHASE_A_MODE: ${{ github.event.inputs.phase_a_mode || '' }}
          SKIP_PHASE_A: ${{ github.event.inputs.skip_phase_a || 'false' }}
          ALLOW_LIVE_TRADING: 'true'
        run: python main.py

      - name: Sync reports to dashboard
        if: success()
        run: python scripts/sync_reports.py

      - name: Upload pipeline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report-${{ github.run_id }}
          path: |
            data/reports/pipeline_result.json
            logs/
          retention-days: 30
          if-no-files-found: warn

      - name: Commit data back to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Rebase onto remote main to pick up any pushes made during the pipeline run.
          # --autostash handles modified tracked files (positions_log, decision_log, etc.).
          # New untracked files (daily_report_*.json) are untouched by rebase and remain
          # in the working tree — do NOT use git stash --include-untracked as a failed
          # stash pop silently swallows new files and nothing gets committed.
          git fetch origin main
          git rebase --autostash origin/main
          # Stage all pipeline output files (tracked modifications + new untracked files).
          # Use || true for individual file paths — they abort with set -e if missing.
          # Directory paths (reports/, memory/) never fail even if nothing changed.
          git add data/memory/positions_log.json   || true
          git add data/memory/decision_log.json    || true
          git add data/memory/pattern_history.json || true
          git add dashboard/data/reports/
          git add dashboard/data/memory/
          # Only commit and push if there are staged changes.
          # Retry push up to 3 times in case another workflow pushed between our rebase and push.
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: daily pipeline data update $(date -u '+%Y-%m-%d')"
            for i in 1 2 3; do
              git push origin HEAD:main && break
              echo "Push attempt $i failed — rebasing and retrying..."
              git fetch origin main && git rebase --autostash origin/main
            done
          fi

      # Dashboard deploy is handled by deploy.yml, triggered automatically
      # when the "Commit data back to repo" step pushes dashboard/data/** changes.
      # Keeping deploy out of this workflow ensures a broken dashboard build
      # never causes a false-failure of the trading pipeline.

